name: CI and Docker Build

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: civicflow
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d civicflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate backend imports
        run: |
          cd backend
          python -m py_compile app.py routes.py classifier.py models.py

      - name: Build Docker images
        run: |
          docker build -f Dockerfile.backend -t civicflow-backend .
          docker build -f Dockerfile.frontend -t civicflow-frontend .

      - name: Login to Docker Hub
        if: secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_PASSWORD != ''
        uses: docker/login-action@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Push Docker images
        if: secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_PASSWORD != ''
        run: |
          docker tag civicflow-backend ${{ secrets.DOCKERHUB_USERNAME }}/civicflow-backend:latest
          docker tag civicflow-frontend ${{ secrets.DOCKERHUB_USERNAME }}/civicflow-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/civicflow-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/civicflow-frontend:latest

      - name: Deploy to production server via SSH
        if: secrets.SSH_HOST != '' && secrets.SSH_USER != '' && secrets.SSH_PRIVATE_KEY != ''
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /var/www/civicflow || exit 1
            docker compose pull
            docker compose up -d

      - name: Deploy to Kubernetes cluster
        if: secrets.KUBE_CONFIG_DATA != '' && secrets.DOCKERHUB_USERNAME != ''
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > $HOME/.kube/config
          python - <<'PY'
import os
from pathlib import Path

repo = os.getenv('DOCKERHUB_USERNAME')
for src, dst in [
    ('k8s/backend-deployment.yml', '/tmp/backend-deployment.yml'),
    ('k8s/frontend-deployment.yml', '/tmp/frontend-deployment.yml'),
]:
    text = Path(src).read_text()
    Path(dst).write_text(text.replace('DOCKERHUB_REPO', repo))
PY
          kubectl apply -f /tmp/backend-deployment.yml
          kubectl apply -f k8s/backend-service.yml
          kubectl apply -f /tmp/frontend-deployment.yml
          kubectl apply -f k8s/frontend-service.yml

  deploy-gh-pages:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend for GitHub Pages
        run: |
          npm run build:gh
          echo > dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

      - name: Configure GitHub Pages site
        run: |
          curl -s -X PATCH https://api.github.com/repos/${{ github.repository }}/pages \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}'
