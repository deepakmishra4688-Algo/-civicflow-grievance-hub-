name: CI and Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: civicflow
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d civicflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate backend imports
        run: |
          cd backend
          python -m py_compile app.py routes.py classifier.py models.py

      - name: Build Docker images
        run: |
          docker build -f Dockerfile.backend -t civicflow-backend .
          docker build -f Dockerfile.frontend -t civicflow-frontend .

      - name: Login to Docker Hub
        if: secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_PASSWORD != ''
        uses: docker/login-action@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Push Docker images
        if: secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_PASSWORD != ''
        run: |
          docker tag civicflow-backend ${{ secrets.DOCKERHUB_USERNAME }}/civicflow-backend:latest
          docker tag civicflow-frontend ${{ secrets.DOCKERHUB_USERNAME }}/civicflow-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/civicflow-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/civicflow-frontend:latest
